name: Terraform Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./VM Creation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIAL }}

      - name: Verify Azure authentication
        run: az account show --output table

      - name: Terraform init
        env:
          ARM_USE_AZUREAD: true
          ARM_CLIENT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIAL).clientId }}
          ARM_CLIENT_SECRET: ${{ fromJSON(secrets.AZURE_CREDENTIAL).clientSecret }}
          ARM_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIAL).subscriptionId }}
          ARM_TENANT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIAL).tenantId }}
        run: |
          TFSTATE_STORAGE_ACCOUNT=cloudshell050620262
          TFSTATE_CONTAINER=stgterraformstatefile

          TFSTATE_RESOURCE_GROUP=$(az storage account show \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --query resourceGroup \
            --output tsv)

          echo "TFSTATE_RESOURCE_GROUP=$TFSTATE_RESOURCE_GROUP" >> "$GITHUB_ENV"

          az storage container create \
            --account-name "$TFSTATE_STORAGE_ACCOUNT" \
            --name "$TFSTATE_CONTAINER" \
            --auth-mode login \
            --public-access off \
            --output none || true

          OBJECT_ID=$(az ad sp show --id "$ARM_CLIENT_ID" --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "/subscriptions/$ARM_SUBSCRIPTION_ID/resourceGroups/$TFSTATE_RESOURCE_GROUP/providers/Microsoft.Storage/storageAccounts/$TFSTATE_STORAGE_ACCOUNT" \
            --only-show-errors || true

          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=$TFSTATE_RESOURCE_GROUP" \
            -backend-config="storage_account_name=$TFSTATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TFSTATE_CONTAINER" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
        run: terraform plan -input=false -var="admin_password=$TF_VAR_admin_password" -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
        run: terraform apply -input=false -auto-approve tfplan
