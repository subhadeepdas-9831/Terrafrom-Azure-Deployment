name: Terraform Azure Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      ARM_USE_CLI: false
      ARM_CLIENT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIAL).clientId }}
      ARM_CLIENT_SECRET: ${{ fromJSON(secrets.AZURE_CREDENTIAL).clientSecret }}
      ARM_SUBSCRIPTION_ID: ${{ fromJSON(secrets.AZURE_CREDENTIAL).subscriptionId }}
      ARM_TENANT_ID: ${{ fromJSON(secrets.AZURE_CREDENTIAL).tenantId }}

    defaults:
      run:
        working-directory: ./VM Creation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIAL }}

      - name: Verify Azure authentication
        run: az account show --output table

      - name: Terraform init
        run: |
          TFSTATE_STORAGE_ACCOUNT=cloudshell05062026
          TFSTATE_CONTAINER=stgterraformstatefile

          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=rg-terraform-state" \
            -backend-config="storage_account_name=$TFSTATE_STORAGE_ACCOUNT" \
            -backend-config="container_name=$TFSTATE_CONTAINER" \
            -backend-config="key=terraform.tfstate"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        env:
          TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
        run: terraform plan -input=false -var="admin_password=$TF_VAR_admin_password" -out=tfplan

      - name: Terraform apply
        env:
          TF_VAR_admin_password: ${{ secrets.VM_ADMIN_PASSWORD }}
        run: terraform apply -input=false -auto-approve tfplan
